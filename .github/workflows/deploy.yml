name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt
        pip install pytest httpx

    - name: Run tests
      run: |
        export ENV=test
        export PROJECT_NAME=Test
        export DATABASE_URL=sqlite:///./test.db
        export SECRET_KEY=testsecret
        export ACCESS_TOKEN_EXPIRE_MINUTES=30
        export PAYPAL_CLIENT_ID=test
        export PAYPAL_CLIENT_SECRET=test
        export PAYPAL_API=https://api.sandbox.paypal.com

        PYTHONPATH=. pytest --maxfail=1 --disable-warnings -q

    - name: Login Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/academix-backend:latest .

    - name: Push image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/academix-backend:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd ~/academix

          echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" > .env
          echo "MYSQL_DATABASE=${{ secrets.MYSQL_DATABASE }}" >> .env
          echo "DATABASE_URL=${{ secrets.DATABASE_URL }}" > .env.backend
          echo "PROJECT_NAME=${{ secrets.PROJECT_NAME }}" >> .env.backend
          echo "SECRET_KEY=${{ secrets.SECRET_KEY }}" >> .env.backend
          echo "PAYPAL_CLIENT_ID=${{ secrets.PAYPAL_CLIENT_ID }}" >> .env.backend
          echo "PAYPAL_CLIENT_SECRET=${{ secrets.PAYPAL_CLIENT_SECRET }}" >> .env.backend
          echo "PAYPAL_API=${{ secrets.PAYPAL_API }}" >> .env.backend
          echo "ACCESS_TOKEN_EXPIRE_MINUTES=${{ secrets.ACCESS_TOKEN_EXPIRE_MINUTES }}" >> .env.backend

          docker pull ${{ secrets.DOCKER_USERNAME }}/academix-backend:latest

          docker-compose stop backend || true
          docker-compose rm -f backend || true

          docker-compose up -d --no-deps backend